# .github/workflows/ci.yml  ← 각 서비스 repo에 이 파일을 복사해서 사용
#
# [필수 수정 항목]
#   1. uses 경로의 `your-org`  → 실제 GitHub organization 이름
#   2. service-name            → 이 서비스의 고유 이름
#   3. language                → 아래 중 하나 선택: node | python | go | java
#   4. <language>-version      → 선택한 언어의 버전 input 하나만 남기고 나머지 삭제
#   5. docker-registry         → ghcr.io/<org> 또는 ECR URL 등
#
# [언어별 버전 input 대응표]
#   language: node   → node-version:   "20.x"
#   language: python → python-version: "3.11"
#   language: go     → go-version:     "1.22"
#   language: java   → java-version:   "21"  + java-distribution: "temurin"

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    uses: your-org/.github/.github/workflows/reusable-test.yml@main
    with:
      service-name: user-api
      language: node        # ← 변경 시 아래 버전 input도 함께 교체
      node-version: "20.x"  # node   → node-version
      # python-version: "3.11"  # python → python-version
      # go-version: "1.22"      # go     → go-version
      # java-version: "21"      # java   → java-version (+ java-distribution)
      coverage-threshold: "80"
    secrets:
      sonar-token: ${{ secrets.SONAR_TOKEN }}

  build:
    needs: test
    uses: your-org/.github/.github/workflows/reusable-build.yml@main
    with:
      service-name: user-api
      docker-registry: ghcr.io/your-org
      # 아래는 기본값과 다를 때만 명시
      # build-context: .
      # dockerfile: Dockerfile
      # platforms: linux/amd64,linux/arm64
      # severity: HIGH,CRITICAL
      # sign-image: true
    secrets:
      registry-username: ${{ github.actor }}
      registry-password: ${{ secrets.GITHUB_TOKEN }}
